services:
  - type: web
    name: taxonomy-product-backend
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: API_TITLE
        value: taxonomy-product-api
      - key: API_VERSION
        value: 0.1.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
